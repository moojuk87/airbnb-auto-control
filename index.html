<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStays 자동화 컨트롤</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #FF5A5F;
    --accent-dim: rgba(255,90,95,0.15);
    --text: #f0f0f0;
    --muted: #888;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --queued: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
    max-width: 480px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .section {
    margin-bottom: 1.75rem;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .run-all-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    letter-spacing: -0.2px;
    transition: opacity 0.15s;
  }

  .run-all-btn:hover { opacity: 0.88; }
  .run-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .task-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .task-item:last-child { border-bottom: none; }

  .task-info { flex: 1; }
  .task-name { font-size: 14px; font-weight: 500; }
  .task-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .task-btn {
    font-size: 12px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: background 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .task-btn:hover { background: var(--border); }
  .task-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .schedule-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
  }

  .schedule-label { font-size: 14px; font-weight: 500; }
  .schedule-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .schedule-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .time-input {
    width: 54px;
    padding: 7px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    text-align: center;
  }

  .save-btn {
    font-size: 12px;
    padding: 7px 12px;
    border: 1px solid var(--accent);
    border-radius: 8px;
    background: var(--accent-dim);
    color: var(--accent);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    white-space: nowrap;
  }

  .runs-area {
    padding: 4px 0;
  }

  .run-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
  }

  .run-item:last-child { border-bottom: none; }

  .run-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-success { background: var(--success); }
  .dot-failure { background: var(--danger); }
  .dot-running { background: var(--warning); }
  .dot-queued { background: var(--queued); }

  .run-name { flex: 1; font-size: 13px; color: var(--text); }
  .run-meta { font-size: 11px; color: var(--muted); text-align: right; }
  .run-status { font-size: 11px; font-weight: 500; }
  .run-status.success { color: var(--success); }
  .run-status.failure { color: var(--danger); }
  .run-status.running { color: var(--warning); }

  .log-area {
    background: #0a0a0a;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    color: var(--muted);
    min-height: 80px;
    max-height: 200px;
    overflow-y: auto;
    line-height: 1.7;
  }

  .log-ok { color: var(--success); }
  .log-err { color: var(--danger); }
  .log-info { color: var(--muted); }

  .link-btn {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s;
    text-decoration: none;
  }

  .link-btn:hover { background: var(--surface); }

  .refresh-btn {
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .empty-msg {
    padding: 16px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  .runs-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
  }

  .runs-title { font-size: 12px; color: var(--muted); }

  .pulse {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--warning);
    animation: pulse 1.2s infinite;
    margin-right: 4px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div id="tokenSetup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem;">
  <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:1.5rem;width:100%;max-width:360px;">
    <div style="font-size:15px;font-weight:700;margin-bottom:6px;">GitHub 토큰 입력</div>
    <div style="font-size:12px;color:#888;margin-bottom:16px;">최초 1회만 입력하면 저장돼요</div>
    <input type="password" id="tokenInput" placeholder="ghp_..." style="width:100%;padding:10px 12px;background:#0f0f0f;border:1px solid #2a2a2a;border-radius:10px;color:#f0f0f0;font-size:13px;margin-bottom:12px;">
    <button onclick="saveToken()" style="width:100%;padding:12px;background:#FF5A5F;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">저장</button>
  </div>
</div>

<div class="header">
  <div class="logo">M</div>
  <div class="header-text">
    <h1>MyStays 자동화</h1>
    <p>Airbnb Auto Maintain Control</p>
  </div>
</div>

<div class="section">
  <button class="run-all-btn" id="runAllBtn" onclick="runWorkflow('all')">
    전체 실행
  </button>
</div>

<div class="section">
  <div class="section-label">개별 실행</div>
  <div class="card">
    <div class="task-item">
      <div class="task-info">
        <div class="task-name">제목 변경</div>
        <div class="task-desc">title_changer.py</div>
      </div>
      <button class="task-btn" onclick="runWorkflow('title_changer')">실행</button>
    </div>
    <div class="task-item">
      <div class="task-info">
        <div class="task-name">가격 조정</div>
        <div class="task-desc">price_adjuster.py</div>
      </div>
      <button class="task-btn" onclick="runWorkflow('price_adjuster')">실행</button>
    </div>
    <div class="task-item">
      <div class="task-info">
        <div class="task-name">사진 순서 변경</div>
        <div class="task-desc">photo_arranger.py</div>
      </div>
      <button class="task-btn" onclick="runWorkflow('photo_arranger')">실행</button>
    </div>
    <div class="task-item">
      <div class="task-info">
        <div class="task-name">노출 매크로</div>
        <div class="task-desc">exposure_macro.py</div>
      </div>
      <button class="task-btn" onclick="runWorkflow('exposure_macro')">실행</button>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label">스케줄 설정</div>
  <div class="card">
    <div class="schedule-row">
      <div>
        <div class="schedule-label">매일 자동 실행</div>
        <div class="schedule-sub" id="scheduleInfo">현재: 매일 오전 9시 (KST)</div>
      </div>
      <div class="schedule-right">
        <input type="number" class="time-input" id="scheduleHour" min="0" max="23" value="9" placeholder="시">
        <span style="font-size:12px;color:var(--muted)">시</span>
        <button class="save-btn" onclick="saveSchedule()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">
    <span>실행 결과</span>
    <button class="refresh-btn" onclick="loadRuns()">새로고침</button>
  </div>
  <div class="card" style="margin-bottom:10px;">
    <div class="runs-area" id="runsArea">
      <div class="empty-msg">로딩 중...</div>
    </div>
  </div>
  <div class="log-area" id="logArea">
    <span class="log-info">대기 중...</span>
  </div>
</div>

<div class="section">
  <a class="link-btn" href="https://docs.google.com/spreadsheets/d/1xtB4Rj1QwSjtDIsYeHzyPQ1XclnfHzydK4Gs_MXTkMA" target="_blank">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Google Sheets 열기
  </a>
</div>

<script>
const TOKEN = localStorage.getItem('gh_token') || '';
const REPO = 'moojuk87/airbnb-auto-maintain';
const WORKFLOW = 'schedule.yml';

function log(msg, type = 'info') {
  const area = document.getElementById('logArea');
  if (area.querySelector('.log-info')?.textContent === '대기 중...') area.innerHTML = '';
  const line = document.createElement('div');
  line.className = 'log-' + type;
  const t = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  line.textContent = '[' + t + '] ' + msg;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

async function runWorkflow(task) {
  const btn = document.getElementById('runAllBtn');
  btn.disabled = true;
  btn.textContent = '실행 중...';
  log('실행 요청 중: ' + task + '...');
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main', inputs: { task } })
    });
    if (res.status === 204) {
      log('실행 요청 성공! GitHub Actions 처리 중...', 'ok');
      setTimeout(loadRuns, 4000);
      setTimeout(loadRuns, 10000);
    } else {
      const data = await res.json().catch(() => ({}));
      log('오류: ' + (data.message || res.status), 'err');
    }
  } catch(e) {
    log('네트워크 오류: ' + e.message, 'err');
  }
  btn.disabled = false;
  btn.textContent = '전체 실행';
}

async function loadRuns() {
  try {
    const res = await fetch(`https://api.github.com/repos/${REPO}/actions/runs?per_page=6`, {
      headers: { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    const data = await res.json();
    const area = document.getElementById('runsArea');
    if (!data.workflow_runs || data.workflow_runs.length === 0) {
      area.innerHTML = '<div class="empty-msg">실행 기록 없음</div>';
      return;
    }
    area.innerHTML = data.workflow_runs.slice(0, 6).map(run => {
      const status = run.conclusion || run.status;
      const dotClass = status === 'success' ? 'dot-success' : status === 'failure' ? 'dot-failure' : status === 'in_progress' ? 'dot-running' : 'dot-queued';
      const label = status === 'success' ? '성공' : status === 'failure' ? '실패' : status === 'in_progress' ? '실행중' : '대기';
      const labelClass = status === 'success' ? 'success' : status === 'failure' ? 'failure' : 'running';
      const time = new Date(run.created_at).toLocaleString('ko-KR', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'});
      const isRunning = status === 'in_progress';
      return `<div class="run-item">
        ${isRunning ? '<span class="pulse"></span>' : `<div class="run-dot ${dotClass}"></div>`}
        <div class="run-name">${run.display_title || 'Airbnb Auto Maintain'}</div>
        <div class="run-meta">
          <div class="run-status ${labelClass}">${label}</div>
          <div>${time}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('runsArea').innerHTML = '<div class="empty-msg" style="color:#ef4444">로드 실패</div>';
  }
}

function saveSchedule() {
  const hour = parseInt(document.getElementById('scheduleHour').value);
  if (isNaN(hour) || hour < 0 || hour > 23) {
    log('0~23 사이 값을 입력해줘요', 'err');
    return;
  }
  const utcHour = (hour - 9 + 24) % 24;
  document.getElementById('scheduleInfo').textContent = `현재: 매일 오전 ${hour}시 (KST)`;
  log(`schedule.yml → cron: '0 ${utcHour} * * *' 으로 변경 후 push 해줘요`, 'info');
}

if(TOKEN) { loadRuns(); setInterval(loadRuns, 30000); }

function saveToken() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  localStorage.setItem('gh_token', t);
  document.getElementById('tokenSetup').style.display = 'none';
  loadRuns();
}

function checkToken() {
  if (!localStorage.getItem('gh_token')) {
    document.getElementById('tokenSetup').style.display = 'flex';
  }
}

checkToken();

</script>
</body>
</html>
